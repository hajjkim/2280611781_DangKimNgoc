stages:
  - build
  - test
  - deploy

build:
  stage: build
  script:
    - echo "Building the project..."
    - date
  artifacts:
    paths:
      - BaiTap7/public
    expire_in: 1 day

test:
  stage: test
  script:
    - echo "Running tests..."
    - test -f BaiTap7/public/index.html || exit 1
    - test -f BaiTap7/public/styles.css || exit 1
    - test -f BaiTap7/public/js/main.js || exit 1

pages:
  stage: deploy
  script:
    - echo "Deploying to GitLab Pages..."
    - rm -rf public
    - mkdir public
    - cp -r BaiTap7/public/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'